name: Daily Sanctions Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Run sanctions sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          MY_SERVICE_ROLE_KEY: ${{ secrets.MY_SERVICE_ROLE_KEY }}
          OPENSANCTIONS_TOKEN: ${{ secrets.OPENSANCTIONS_TOKEN }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: npx tsx src/scripts/sanctions-sync-local.ts
